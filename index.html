<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Gym Base | Iniciar sesión</title>
  <link rel="stylesheet" href="style.css?v=19">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="icon" type="image/png" href="icons/icon-192.png">
  <meta name="theme-color" content="#0f172a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
</head>
<body>
  <div id="estadoConexion" class="estado-conexion hidden"></div>

  <section id="loadingScreen" class="loading-screen">
    <div class="loader"></div>
    <p>Revisando sesión...</p>
  </section>

  <main id="authScreen" class="auth-screen hidden">
    <section class="auth-card">
      <div class="auth-brand">TGB</div>
      <h1>The Gym Base</h1>
      <p>Registra tus entrenamientos y revisa tu progreso.</p>

      <div class="tabs" role="tablist" aria-label="Acceso">
        <button id="loginTab" class="tab-active" type="button">Iniciar sesión</button>
        <button id="registerTab" type="button">Crear cuenta</button>
      </div>

      <form id="loginBox" autocomplete="on">
        <label for="loginNombre">Usuario</label>
        <input id="loginNombre" type="text" autocomplete="username" placeholder="Tu nombre de usuario" required>
        <label for="loginPassword">Contraseña</label>
        <div class="password-field">
          <input id="loginPassword" type="password" autocomplete="current-password" placeholder="Tu contraseña" required>
          <button class="password-toggle" type="button" data-password-target="loginPassword" aria-label="Mostrar contraseña" aria-pressed="false">
            <span aria-hidden="true">👁</span>
          </button>
        </div>
        <button id="iniciarSesion" type="submit">Entrar</button>
      </form>

      <form id="registerBox" class="hidden" autocomplete="on">
        <label for="regNombre">Nombre de usuario</label>
        <input id="regNombre" type="text" autocomplete="username" placeholder="Elige un usuario" required>
        <label for="regPassword">Contraseña</label>
        <div class="password-field">
          <input id="regPassword" type="password" autocomplete="new-password" placeholder="Mínimo 6 caracteres" required>
          <button class="password-toggle" type="button" data-password-target="regPassword" aria-label="Mostrar contraseña" aria-pressed="false">
            <span aria-hidden="true">👁</span>
          </button>
        </div>
        <label for="regConfirmar">Confirmar contraseña</label>
        <div class="password-field">
          <input id="regConfirmar" type="password" autocomplete="new-password" placeholder="Repite la contraseña" required>
          <button class="password-toggle" type="button" data-password-target="regConfirmar" aria-label="Mostrar contraseña" aria-pressed="false">
            <span aria-hidden="true">👁</span>
          </button>
        </div>
        <button id="crearCuenta" type="submit">Crear cuenta</button>
      </form>
    </section>
  </main>

  <script src="dialog.js"></script>
<script type="module" src="auth.js"></script>
  <script src="conexion.js" defer></script>
  <script src="pwa.js" defer></script>
<script type="module" src="settings.js"></script>
</body>
</html>
