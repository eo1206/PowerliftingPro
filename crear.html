<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PowerliftingPro | Crear rutina</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="estadoConexion" class="estado-conexion hidden"></div>
<main class="app">

  <header class="header">
    <div>
      <p class="label">Constructor</p>
      <h1>Crear rutina</h1>
    </div>
    <div class="profile">PL</div>
  </header>

  <section class="card">
    <h2>Nueva rutina</h2>

    <label for="nombreRutina">Nombre de la rutina</label>
    <input id="nombreRutina" type="text" placeholder="Ej: Fuerza semana 1">

    <label for="ejercicioRutina">Ejercicio</label>
    <select id="ejercicioRutina">
      <option>Sentadilla</option>
      <option>Press banca</option>
      <option>Peso muerto</option>
      <option>Press militar</option>
      <option>Remo</option>
      <option>Dominadas</option>
      <option>Fondos</option>
      <option>Hip thrust</option>
      <option>Curl bíceps</option>
      <option>Extensión tríceps</option>
    </select>

    <div class="grid">
      <div>
        <label for="seriesRutina">Series</label>
        <input id="seriesRutina" type="number" placeholder="Ej: 5">
      </div>

      <div>
        <label for="repsRutina">Reps objetivo</label>
        <input id="repsRutina" type="number" placeholder="Ej: 3">
      </div>
    </div>

    <button id="agregarEjercicioRutina" type="button">Agregar ejercicio</button>
  </section>

  <section class="card" id="vistaRutina">
    <h2>Vista previa</h2>
    <p class="empty">Agrega ejercicios para crear tu rutina.</p>
  </section>

  <section class="card">
    <button id="guardarRutina" type="button">Guardar rutina</button>
  </section>
<nav class="bottom-nav">
    <a href="index.html">Inicio</a>
    <a href="crear.html" class="active">Crear</a>
    <a href="rutina.html">Rutina</a>
    <a href="progreso.html">Progreso</a>
    <a href="Herramientas.html">Herramientas</a>
  </nav>


</main>

<script type="module" src="firebase.js"></script>
<script type="module" src="crear.js"></script>
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", async () => {
      try {
        const registro = await navigator.serviceWorker.register("/sw.js");
        console.log("Service Worker activo:", registro.scope);
      } catch (error) {
        console.error("Error al registrar Service Worker:", error);
      }
    });
  }
</script>
<script src="conexion.js"></script>
</body>
</html>
