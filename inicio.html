<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GymLog | Inicio</title>
  <link rel="stylesheet" href="style.css?v=11">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="icon" type="image/png" href="icons/icon-192.png">
  <meta name="theme-color" content="#0f172a">
</head>
<body>
  <div id="estadoConexion" class="estado-conexion hidden"></div>
  <section id="loadingScreen" class="loading-screen">
    <div class="loader"></div><p>Cargando GymLog...</p>
  </section>

  <main id="appScreen" class="app hidden">
    <header class="header">
      <div><p class="label">Hola, <span id="nombreUsuario">Usuario</span></p><h1>GymLog</h1></div>
      <button id="cerrarSesion" type="button" class="logout">Salir</button>
    </header>

    <section class="card summary"><div><p>Panel de entrenamiento</p><h2>Gimnasio</h2></div></section>

    <section class="stats">
      <div class="stat"><p>Sentadilla</p><h3><span id="prSentadilla">0</span> kg</h3></div>
      <div class="stat"><p>Banca</p><h3><span id="prBanca">0</span> kg</h3></div>
      <div class="stat"><p>Peso muerto</p><h3><span id="prMuerto">0</span> kg</h3></div>
    </section>

    <section class="card">
      <h2>Registrar ejercicio</h2>
      <form id="trainingForm">
        <label for="exercise">Ejercicio</label>
        <select id="exercise"><option>Sentadilla</option><option>Press banca</option><option>Peso muerto</option></select>
        <div class="grid">
          <div><label for="peso">Peso</label><input id="peso" type="number" min="0" step="0.5" placeholder="kg" required></div>
          <div><label for="reps">Reps</label><input id="reps" type="number" min="1" max="36" placeholder="5" required></div>
        </div>
        <div class="grid">
          <div><label for="rpe">RPE</label><input id="rpe" type="number" min="0" max="10" step="0.5" placeholder="8"></div>
          <label class="equipped-check" for="equipado">
            <input id="equipado" type="checkbox">
            <span>Levantamiento equipado</span>
          </label>
        </div>
        <label for="notas">Notas</label><textarea id="notas" placeholder="Técnica, sensaciones, molestias..."></textarea>
        <button type="submit">Guardar registro</button>
      </form>
    </section>

    <section class="card" id="listaRegistros"><h2>Últimos registros</h2><p class="empty">Cargando...</p></section>

    <nav class="bottom-nav">
      <a href="inicio.html" class="active">Inicio</a><a href="crear.html">Crear</a><a href="rutina.html">Rutina</a><a href="progreso.html">Progreso</a><a href="ranking.html">Ranking</a><a href="Herramientas.html">Herramientas</a>
    </nav>
  </main>

  <script src="dialog.js"></script>
<script type="module" src="inicio.js"></script>
  <script src="conexion.js" defer></script>
  <script src="pwa.js" defer></script>
</body>
</html>
