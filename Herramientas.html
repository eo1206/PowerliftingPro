<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PowerliftingPro | Herramientas</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="estadoConexion" class="estado-conexion hidden"></div>
<main class="app">

  <header class="header">
    <div>
      <p class="label">Calculadoras</p>
      <h1>Herramientas</h1>
    </div>
    <div class="profile">PL</div>
  </header>

  <section class="card">
    <h2>Peso a discos</h2>

    <input id="pesoObjetivo" type="number" placeholder="Peso total con barra">
    <input id="pesoBarra" type="number" value="20" placeholder="Peso de la barra">

    <button id="calcularDiscos" type="button">Calcular discos</button>

    <div id="resultadoDiscos"></div>
  </section>

  <section class="card">
    <h2>Discos a peso</h2>

    <p class="label">Cantidad por lado</p>

    <div class="grid">
      <input id="d25" type="number" placeholder="25 kg">
      <input id="d20" type="number" placeholder="20 kg">
      <input id="d15" type="number" placeholder="15 kg">
      <input id="d10" type="number" placeholder="10 kg">
      <input id="d5" type="number" placeholder="5 kg">
      <input id="d25chico" type="number" placeholder="2.5 kg">
      <input id="d125" type="number" placeholder="1.25 kg">
    </div>

    <button id="calcularPeso" type="button">Calcular peso total</button>

    <div id="resultadoPeso"></div>
  </section>

  <section class="card">
    <h2>Calculadora 1RM</h2>

    <div class="grid">
      <input id="peso1rm" type="number" placeholder="Peso kg">
      <input id="reps1rm" type="number" placeholder="Reps">
    </div>

    <button id="calcular1RM" type="button">Calcular 1RM</button>

    <div id="resultado1RM"></div>
  </section>

  <section class="card">
    <h2>Puntos IPF GL</h2>

    <label>Sexo</label>
    <select id="sexoGL" title="Seleccionar sexo">
      <option value="hombre">Hombre</option>
      <option value="mujer">Mujer</option>
    </select>

    <label>Modalidad</label>
    <select id="modalidadGL" title="Seleccionar modalidad">
      <option value="classicPowerlifting">Classic Powerlifting</option>
      <option value="equippedPowerlifting">Equipped Powerlifting</option>
      <option value="classicBench">Classic Bench Press</option>
      <option value="equippedBench">Equipped Bench Press</option>
    </select>
<div class="grid">
  <div>
    <label for="pesoCorporalGL">Peso corporal</label>
    <input id="pesoCorporalGL" type="number" placeholder="kg">
  </div>

  <div>
    <label for="totalGL">Total</label>
    <input id="totalGL" type="number" placeholder="kg">
  </div>
</div>

    <button id="calcularGL" type="button">Calcular puntos</button>

    <div id="resultadoGL"></div>
  </section>
  
  <section class="card">
    <h2>Discos disponibles</h2>

    <label><input class="disco" type="checkbox" value="25" checked> 25 kg</label>
    <label><input class="disco" type="checkbox" value="20" checked> 20 kg</label>
    <label><input class="disco" type="checkbox" value="15" checked> 15 kg</label>
    <label><input class="disco" type="checkbox" value="10" checked> 10 kg</label>
    <label><input class="disco" type="checkbox" value="5" checked> 5 kg</label>
    <label><input class="disco" type="checkbox" value="2.5" checked> 2.5 kg</label>
    <label><input class="disco" type="checkbox" value="1.25"> 1.25 kg</label>
  </section>


 <nav class="bottom-nav">
    <a href="index.html">Inicio</a>
    <a href="crear.html">Crear</a>
    <a href="rutina.html">Rutina</a>
    <a href="progreso.html">Progreso</a>
    <a href="Herramientas.html" class="active">Herramientas</a>
  </nav>

</main>

<script type="module" src="herramientas.js"></script>
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", async () => {
      try {
        const registro = await navigator.serviceWorker.register("/sw.js");
        console.log("Service Worker activo:", registro.scope);
      } catch (error) {
        console.error("Error al registrar Service Worker:", error);
      }
    });
  }
</script>
<script src="conexion.js"></script>
</body>
</html>
