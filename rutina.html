<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PowerliftingPro | Rutina</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<main class="app">

  <header class="header">
    <div>
      <p class="label">Plan activo</p>
      <h1>Mi rutina</h1>
    </div>
    <div class="profile">PL</div>
  </header>

  <section class="card summary">
    <div>
      <p>Semana actual</p>
      <h2>Semana 1</h2>
    </div>
    <span>3 días</span>
  </section>
<section class="card">
  <h2>Crear rutina</h2>

  <input id="nombreRutina" type="text" placeholder="Nombre de la rutina">

  <label>Ejercicio</label>
  <select id="ejercicioRutina">
    <option>Sentadilla</option>
    <option>Press banca</option>
    <option>Peso muerto</option>
    <option>Press militar</option>
    <option>Remo</option>
  </select>

  <div class="grid">
    <input id="pesoRutina" type="number" placeholder="Peso kg">
    <input id="repsRutina" type="number" placeholder="Reps">
  </div>

  <button id="agregarEjercicioRutina" type="button">Agregar ejercicio</button>
  <button id="guardarRutina" type="button">Crear rutina</button>
</section>

<section class="card" id="vistaRutina">
  <h2>Rutina</h2>
  <p class="empty">Todavía no hay rutina.</p>
</section>

  <nav class="bottom-nav">
    <a href="index.html">Inicio</a>
    <a href="rutina.html" class="active">Rutina</a>
    <a href="crear.html">Crear</a>
    <a href="progreso.html">Progreso</a>
    <a href="Herramientas.html">Herramientas</a>
  </nav>

</main>
<script type="module" src="firebase.js"></script>
<script type="module" src="rutina.js"></script>
</body>
</html>
