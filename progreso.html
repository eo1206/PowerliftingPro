<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PowerliftingPro | Progreso</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<main class="app">

  <header class="header">
    <div>
      <p class="label">Estadísticas</p>
      <h1>Progreso</h1>
    </div>
    <div class="profile">PL</div>
  </header>

  <section class="stats">
    <div class="stat">
      <p>PR Sentadilla</p>
      <h3>120 kg</h3>
    </div>
    <div class="stat">
      <p>PR Banca</p>
      <h3>85 kg</h3>
    </div>
    <div class="stat">
      <p>PR Muerto</p>
      <h3>150 kg</h3>
    </div>
  </section>

  <section class="card">
    <h2>Volumen semanal</h2>
    <div class="fake-chart">
      <div style="height:40%"></div>
      <div style="height:70%"></div>
      <div style="height:55%"></div>
      <div style="height:90%"></div>
      <div style="height:65%"></div>
    </div>
  </section>

  <section class="card">
    <h2>Resumen</h2>

    <div class="exercise">
      <div>
        <h3>Entrenamientos</h3>
        <p>12 sesiones este mes</p>
      </div>
      <span>+3</span>
    </div>

    <div class="exercise">
      <div>
        <h3>Volumen total</h3>
        <p>42,500 kg levantados</p>
      </div>
      <span>Mes</span>
    </div>
  </section>

  <nav class="bottom-nav">
    <a href="inicio.html">Inicio</a>
    <a href="rutina.html">Rutina</a>
    <a href="crear.html">Crear</a>
    <a href="progreso.html" class="active">Progreso</a>
    <a href="herramientas.html">Herramientas</a>
  </nav>

</main>

</body>
</html>
